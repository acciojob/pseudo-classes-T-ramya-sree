<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Pseudo Classes Implementation</title>

    <style>
        /* Page background using :root */
        :root {
            background-color: rgb(135, 206, 235);
        }

        body {
            margin: 20px;
            font-family: Arial, sans-serif;
        }

        /* Paragraph styling */
        article p:first-child {
            color: white;
            background-color: black;
        }

        article p:nth-child(2) {
            color: black;
        }

        article p:last-child {
            color: red;
        }

        /* List styling */
        ul li {
            width: 50%;
            padding: 10px;
            background-color: gray;
            list-style: none;
        }

        /* Odd items white background */
        ul li:nth-child(odd) {
            background-color: white;
        }

        /* First and last item font size */
        ul li:first-child,
        ul li:last-child {
            font-size: 22px;
        }

        /* Third-to-last item (3rd from end) */
        ul li:nth-last-child(3) {
            background-color: pink;
        }
    </style>
</head>

<body>

    <!-- Article with paragraphs -->
    <article>
        <p>First paragraph - styled with black background and white text</p>
        <p>Second paragraph - normal text color</p>
        <p>Third paragraph - red text</p>
    </article>

    <!-- Unordered list -->
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li>Item 4</li>
        <li>Item 5</li>
    </ul>

</body>
</html>
